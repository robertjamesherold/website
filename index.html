<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robert James Herold — Portfolio</title>

    <meta name="google-site-verification" content="lPyyGP5eJRk6kDt3EBNE3I5dv8E-xHbb6y0kiwMwwHg" />

    <!-- SEO -->
    <meta name="description" content="UX/UI Designer mit Fokus auf konzeptionell fundierte Gestaltung. Mobile Apps, Markenauftritte und Bewegtbild – vom Nutzer aus gedacht, visuell auf den Punkt gebracht." />
    <meta name="author" content="Robert James Herold" />
    <meta name="robots" content="index, follow" />

    <!-- Theme Color (Mobile Browser Chrome) — matches the project's surfaces -->
    <meta name="theme-color" content="#0b0e13" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0e13" />
    <meta name="msapplication-TileColor" content="#0b0e13" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RJ Herold" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Apply the saved theme before first paint to avoid a flash.
         Mirrors src/theme/theme.ts: 'light'/'dark' = explicit, absent = system. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
