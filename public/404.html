<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seite nicht gefunden — Robert James Herold</title>

    <meta name="robots" content="noindex, follow" />

    <meta name="theme-color" content="#0b0e13" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0e13" />

    <!-- Apply the saved theme before first paint to avoid a flash.
         Mirrors src/theme/theme.ts: 'light'/'dark' = explicit, absent = system. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=Azeret+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- Light tokens (mirror src/styles/tokens.css) --- */
      :root {
        --bg-1: hsl(0, 0%, 100%);
        --bg-2: hsl(220, 30%, 97%);
        --text-1: hsl(220, 40%, 12%);
        --text-2: hsl(215, 25%, 30%);
        --text-3: hsl(215, 20%, 50%);
        --border-1: hsl(215, 25%, 80%);
        --primary: hsl(244, 75%, 59%);
        --gradient:
          radial-gradient(ellipse 1200px 600px at 80% -10%, hsla(244, 75%, 59%, 0.1), transparent 60%),
          radial-gradient(ellipse 1000px 500px at -10% 30%, hsla(244, 75%, 59%, 0.06), transparent 60%);
        color-scheme: light;
      }

      /* --- Dark via OS preference (unless user forced light) --- */
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme='light']) {
          --bg-1: hsl(225, 25%, 6%);
          --bg-2: hsl(225, 25%, 8%);
          --text-1: hsl(220, 30%, 96%);
          --text-2: hsl(220, 20%, 75%);
          --text-3: hsl(220, 15%, 65%);
          --border-1: hsl(220, 25%, 20%);
          --primary: hsl(241, 100%, 69%);
          --gradient:
            radial-gradient(ellipse 1200px 600px at 80% -10%, hsla(241, 100%, 69%, 0.1), transparent 60%),
            radial-gradient(ellipse 1000px 500px at -10% 30%, hsla(220, 25%, 15%, 0.06), transparent 60%);
          color-scheme: dark;
        }
      }

      /* --- Dark forced explicitly (wins over OS) --- */
      :root[data-theme='dark'] {
        --bg-1: hsl(225, 25%, 6%);
        --bg-2: hsl(225, 25%, 8%);
        --text-1: hsl(220, 30%, 96%);
        --text-2: hsl(220, 20%, 75%);
        --text-3: hsl(220, 15%, 65%);
        --border-1: hsl(220, 25%, 20%);
        --primary: hsl(241, 100%, 69%);
        --gradient:
          radial-gradient(ellipse 1200px 600px at 80% -10%, hsla(241, 100%, 69%, 0.1), transparent 60%),
          radial-gradient(ellipse 1000px 500px at -10% 30%, hsla(220, 25%, 15%, 0.06), transparent 60%);
        color-scheme: dark;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html { -webkit-text-size-adjust: 100%; }

      body {
        font-family: 'Figtree', system-ui, sans-serif;
        background: var(--bg-1);
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        /* Always at least full screen height; footer pinned to the bottom. */
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* Fixed gradient layer — paints once, stays put on scroll. */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background-image: var(--gradient);
      }

      a { color: inherit; text-decoration: none; }

      /* --- Top bar --- */
      .nav {
        background: color-mix(in srgb, var(--bg-2) 80%, transparent);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-1);
      }
      .nav__inner {
        max-width: 1760px;
        margin: 0 auto;
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
      }
      .brand { display: flex; align-items: center; gap: 0.75rem; }
      .brand img { width: 2rem; height: 2rem; flex-shrink: 0; }
      .brand span {
        font-weight: 700;
        letter-spacing: -0.02em;
        font-size: 1.125rem;
      }

      /* --- Main: grows to fill, content centered --- */
      main {
        flex: 1 0 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 1760px;
        width: 100%;
        margin: 0 auto;
        padding: 5rem 1.5rem;
      }
      .eyebrow {
        font-family: 'Azeret Mono', ui-monospace, monospace;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-3);
      }
      h1 {
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.05;
        font-size: clamp(2.5rem, 1.5rem + 4vw, 4rem);
        margin-top: 1.25rem;
      }
      .lede {
        max-width: 560px;
        margin-top: 1.5rem;
        color: var(--text-2);
        font-size: 1rem;
        line-height: 1.65;
      }
      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2.5rem;
        font-family: 'Azeret Mono', ui-monospace, monospace;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-3);
        transition: color 200ms ease-out;
      }
      .home-link:hover { color: var(--text-1); }

      /* --- Footer (mirrors src/global/Footer) --- */
      footer {
        flex-shrink: 0;
        border-top: 1px solid var(--border-1);
        background: var(--bg-2);
      }
      .footer__inner {
        max-width: 1760px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1.5rem;
      }
      .footer__brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-3);
        font-size: 14px;
      }
      .footer__brand img { width: 1.5rem; height: 1.5rem; flex-shrink: 0; }
      .footer__links { display: flex; align-items: center; gap: 1.5rem; font-size: 14px; }
      .footer__links a { color: var(--text-3); transition: color 200ms ease-out; }
      .footer__links a:hover { color: var(--text-1); }

      @media (min-width: 640px) {
        .nav__inner, .footer__inner, main { padding-left: 2.5rem; padding-right: 2.5rem; }
        .footer__inner { flex-direction: row; align-items: center; }
      }
      @media (min-width: 1024px) {
        .nav__inner, .footer__inner, main { padding-left: 5rem; padding-right: 5rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
      }
    </style>
  </head>

  <body>
    <header class="nav">
      <div class="nav__inner">
        <a class="brand" href="/" aria-label="Robert James Herold — Startseite">
          <img src="/favicon.svg" alt="" aria-hidden="true" width="32" height="32" />
          <span>Robert James Herold</span>
        </a>
      </div>
    </header>

    <main>
      <p class="eyebrow">Fehler 404</p>
      <h1>Seite nicht gefunden</h1>
      <p class="lede">
        Die von dir aufgerufene Seite existiert nicht oder wurde verschoben.
        Überprüfe die Adresse oder kehre zur Startseite zurück.
      </p>
      <a class="home-link" href="/">
        <span aria-hidden="true">←</span>
        Zur Startseite
      </a>
    </main>

    <footer>
      <div class="footer__inner">
        <div class="footer__brand">
          <img src="/favicon.svg" alt="" aria-hidden="true" width="24" height="24" />
          <span>&copy; 2026 Robert James Herold. All rights reserved.</span>
        </div>
        <nav class="footer__links">
          <a href="/docs/lebenslauf.pdf" target="_blank" rel="noopener noreferrer">Lebenslauf (PDF)</a>
          <a href="/impressum">Impressum</a>
          <a href="/datenschutz">Datenschutz</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
